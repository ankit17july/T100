<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T100 MQs - The 100 Mathematics Quizzes</title>
    <meta name="description"
        content="A high-pressure math quiz game with 100 progressively difficult levels. One mistake and it's over!">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Space Warp Background -->
    <canvas id="space-canvas"></canvas>
    <div class="overlay-gradient"></div>

    <main id="app">
        <!-- Screen: Landing Page -->
        <section id="screen-landing" class="screen active">
            <div class="glass-card">

                <div class="load-fade-up">
                    <div class="float-element" style="--float-speed: 6s; --float-dist: -5px;">
                        <h1 class="neon-text cosmic-title">T100 MQs</h1>
                    </div>
                </div>

                <div class="load-fade-up delay-1">
                    <div class="float-element" style="--float-speed: 8s; --float-dist: -3px;">
                        <p class="subtitle cosmic-subtitle">One mistake and it's over!</p>
                    </div>
                </div>

                <div class="load-fade-up delay-2" id="new-user-ui">
                    <div class="float-element" style="--float-speed: 7s; --float-dist: -4px;">
                        <div class="input-group">
                            <input type="text" id="player-name" placeholder="Enter your name to begin..."
                                autocomplete="off">
                        </div>
                    </div>
                </div>

                <div class="load-fade-up delay-2 hidden" id="returning-user-ui">
                    <div class="float-element" style="--float-speed: 7s; --float-dist: -4px;">
                        <h3 class="welcome-text">Welcome back, <span id="display-name"
                                class="highlight-name">Player</span></h3>
                        <button id="btn-change-name" class="btn-text">Change Name</button>
                    </div>
                </div>

                <div class="load-fade-up delay-3">
                    <div class="float-element" style="--float-speed: 5s; --float-dist: -6px;">
                        <button id="btn-start" class="btn primary glowing-hover space-btn">Start Game</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- Screen: Game -->
        <section id="screen-game" class="screen">
            <header class="game-header float-element" style="--float-speed: 8s;">
                <div class="stat-box">
                    <span class="label">Level</span>
                    <span id="question-number" class="value">1/100</span>
                </div>
                <div class="stat-box">
                    <span class="label">Score</span>
                    <span id="score-display" class="value">0</span>
                </div>
            </header>

            <div class="glow-container float-element" style="--float-speed: 5s;">
                <div class="question-container">
                    <!-- Shrinking timer bar -->
                    <div class="timer-bar-wrapper">
                        <div id="timer-bar-fill"></div>
                    </div>
                    <div id="question-text">5 + 7 = ?</div>
                </div>
            </div>

            <div class="options-container" id="options-container">
                <!-- Options will be injected here -->
            </div>

            <div class="progress-bar-container mt-auto">
                <div id="game-progress" class="progress-bar" style="width: 0%"></div>
            </div>
        </section>

        <!-- Screen: Leaderboard -->
        <section id="screen-leaderboard" class="screen">
            <div class="glass-card float-element" style="--float-speed: 7s;">
                <h2 class="neon-text text-error">Game Over</h2>
                <div class="final-score">
                    <span class="label">Your Best Score:</span>
                    <span id="final-score-value">0</span><span class="total">/100</span>
                </div>

                <h3>Local Leaderboard</h3>
                <div class="leaderboard-container">
                    <ul id="leaderboard-list">
                        <!-- Leaderboard items injected here natively -->
                    </ul>
                </div>

                <button id="btn-restart" class="btn primary glowing-hover space-btn mt-4">Play Again</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, onSnapshot }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_KEY",
            authDomain: "YOUR_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db; // make global
    </script>
</body>

</html>
